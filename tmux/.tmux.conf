set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-256color:osc7"
set -ga update-environment "COLORTERM"

set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-b
bind C-b send-prefix -2
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g renumber-windows on
set -g allow-passthrough all
set -s set-clipboard on
set -g focus-events on

# New windows/splits inherit current pane's directory
# New windows always open in home directory
bind c new-window -c "~"

# Splits inherit current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Alt+hjkl to move between panes (no wrap)
bind -n M-h if -F '#{pane_at_left}' '' 'select-pane -L'
bind -n M-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -n M-k if -F '#{pane_at_top}' '' 'select-pane -U'
bind -n M-l if -F '#{pane_at_right}' '' 'select-pane -R'

# Alt+[] to move between windows
bind -n M-[ previous-window
bind -n M-] next-window

# Close pane without confirmation
bind-key x kill-pane

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Machine-specific overrides (not tracked)
source-file -q ~/.tmux.conf.local

run '~/.tmux/plugins/tpm/tpm'
